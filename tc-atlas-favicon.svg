<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e7dff"/>
      <stop offset="50%" stop-color="#0099cc"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>

  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#0c1d3d"/>

  <g transform="translate(16, 16)">
    <!-- Globe grid (subtle) -->
    <circle cx="0" cy="0" r="11" fill="none" stroke="url(#fg)" stroke-width="1.2" opacity="0.25"/>
    <ellipse cx="0" cy="0" rx="6" ry="11" fill="none" stroke="url(#fg)" stroke-width="0.7" opacity="0.18"/>
    <line x1="-11" y1="0" x2="11" y2="0" stroke="url(#fg)" stroke-width="0.5" opacity="0.18"/>

    <!-- Cyclone spiral -->
    <path d="M 0,-1
             C 3,-1  4.5,-3  4.5,-5.5
             C 4.5,-8  2.5,-10  -0.5,-10
             C -4.5,-10  -8.5,-7  -9,-3
             C -9.5,1.5  -7.5,6  -3.5,8.5
             C 0,10.5  5.5,10  8.5,7
             C 11,4  11,-0.5  8.5,-3.5"
          fill="none" stroke="url(#fg)" stroke-width="2" stroke-linecap="round" opacity="0.9"/>

    <!-- Eye -->
    <circle cx="0" cy="-0.5" r="1.8" fill="url(#fg)" opacity="0.85"/>
  </g>
</svg>
