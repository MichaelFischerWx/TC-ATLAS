<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 40" height="40" width="280">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e7dff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e7dff"/>
      <stop offset="50%" stop-color="#0099cc"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>

  <!-- Cyclone-globe icon -->
  <g transform="translate(20, 20)">
    <!-- Globe grid lines (subtle) -->
    <circle cx="0" cy="0" r="14" fill="none" stroke="url(#icon-grad)" stroke-width="1.8" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="8" ry="14" fill="none" stroke="url(#icon-grad)" stroke-width="0.8" opacity="0.2"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="url(#icon-grad)" stroke-width="0.6" opacity="0.2"/>

    <!-- Cyclone spiral -->
    <path d="M 0,-1.5
             C 4,-1.5  6,-4  6,-7
             C 6,-10  3,-13  -1,-13
             C -6,-13  -11,-9  -12,-4
             C -13,2  -10,8  -5,11
             C 0,14  7,13  11,9
             C 14,5  14,-1  11,-5"
          fill="none" stroke="url(#icon-grad)" stroke-width="2.2" stroke-linecap="round" opacity="0.9"/>

    <!-- Eye -->
    <circle cx="0" cy="-1" r="2" fill="url(#icon-grad)" opacity="0.8"/>
  </g>

  <!-- TC-ATLAS text -->
  <text x="44" y="27" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" letter-spacing="-0.02em" fill="url(#logo-grad)">TC-ATLAS</text>
</svg>
